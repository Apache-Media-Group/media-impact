name: Deploy LLYC Intelligence Dashboard (CI/CD)

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: 🚀 Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔑 Auth to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: ☁️ Deploy Backend to GCP Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: llyc-intelligence-api
          region: us-central1
          # Desplegar desde el código fuente del subdirectorio 'backend'
          source: backend
          env_vars: |
            GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          # Permitir invocaciones públicas (la seguridad se maneja mediante JWT de Firebase en el código)
          flags: --allow-unauthenticated

